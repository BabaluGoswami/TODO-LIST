<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart To-Do List</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="theme-toggle">
        <button id="themeBtn">🌙 Dark Mode</button>
    </div>

    <div class="container">

        <h2>🚀 Smart To-Do List</h2>

        <div class="input-group">

            <input
                type="text"
                id="taskInput"
                placeholder="Enter task..."
            >

            <input
                type="date"
                id="dueDate"
            >

            <select id="priority">

                <option value="Low">🟢 Low</option>

                <option value="Medium">
                    🟠 Medium
                </option>

                <option value="High">
                    🔴 High
                </option>

            </select>

            <button onclick="addTask()">
                Add
            </button>

        </div>

        <input
            type="text"
            id="searchTask"
            placeholder="🔍 Search Task..."
        >

        <div class="stats">

            <span>
                Total :
                <b id="total">0</b>
            </span>

            <span>
                Completed :
                <b id="completed">0</b>
            </span>

            <span>
                Pending :
                <b id="pending">0</b>
            </span>

        </div>

        <div class="action-buttons">

            <button onclick="sortTasks()">
                📅 Sort by Date
            </button>

            <button
                class="clear-btn"
                onclick="clearAllTasks()"
            >
                🗑 Clear All
            </button>

        </div>

        <ul id="taskList"></ul>

    </div>

    <script src="script.js"></script>

</body>
</html>
